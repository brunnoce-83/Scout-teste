<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Scout de Futebol</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚽ Sistema Scout</h1>
            <p>Análise e avaliação completa de jogadores de futebol</p>
        </header>

        <nav>
            <button class="nav-btn active" id="addPlayerBtn">➕ Adicionar Jogador</button>
            <button class="nav-btn" id="playersListBtn">👥 Lista de Jogadores</button>
            <button class="nav-btn" id="statisticsBtn">📊 Estatísticas</button>
            <button class="nav-btn" id="exportBtn">📤 Exportar</button>
        </nav>

        <!-- Seção: Adicionar Jogador -->
        <div id="addPlayer" class="section active">
            <h2>Adicionar Novo Jogador</h2>

                    <div class="form-group">
                        <label for="playerName">Nome Completo</label>
                        <input type="text" id="playerName" required>
                    </div>
                    <div class="form-group">
                        <label for="playerAge">Idade</label>
                        <input type="number" id="playerAge" min="16" max="45" required>
                    </div>
                    <div class="form-group">
                        <label for="playerPosition">Posição</label>
                        <select id="playerPosition" required>
                            <option value="">Selecione...</option>
                            <option value="Goleiro">Goleiro</option>
                            <option value="Lateral Direito">Lateral Direito</option>
                            <option value="Zagueiro">Zagueiro</option>
                            <option value="Lateral Esquerdo">Lateral Esquerdo</option>
                            <option value="Volante">Volante</option>
                            <option value="Meio-campo">Meio-campo</option>
                            <option value="Meia Atacante">Meia Atacante</option>
                            <option value="Ponta Direita">Ponta Direita</option>
                            <option value="Atacante">Atacante</option>
                            <option value="Ponta Esquerda">Ponta Esquerda</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="playerClub">Clube Atual</label>
                        <input type="text" id="playerClub" required>
                    </div>
                    <div class="form-group">
                        <label for="playerHeight">Altura (cm)</label>
                        <input type="number" id="playerHeight" min="150" max="220" required>
                    </div>
                    <div class="form-group">
                        <label for="playerWeight">Peso (kg)</label>
                        <input type="number" id="playerWeight" min="50" max="120" required>
                    </div>
                    <div class="form-group">
                        <label for="preferredFoot">Pé Preferido</label>
                        <select id="preferredFoot" required>
